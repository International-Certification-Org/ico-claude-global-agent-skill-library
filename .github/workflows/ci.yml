name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run test suite
        run: bash tests/run_tests.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck on bash scripts
        run: shellcheck sync icgasl lib.sh

  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for .env files
        run: |
          count=$(find . -name ".env" -not -path "./.git/*" | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "ERROR: .env files found in repo"
            find . -name ".env" -not -path "./.git/*"
            exit 1
          fi
          echo "No .env files found"

      - name: Check for hardcoded secrets
        run: |
          hits=$(grep -r -l -E "(api_key|api_secret|apikey|secret_key|access_token|private_key)\s*=" \
            --include="*.sh" --include="*.json" --include="*.yml" --include="*.yaml" \
            . 2>/dev/null | grep -v "/.git/" | grep -v "/tests/" | grep -v "/skills/" || true)
          if [ -n "$hits" ]; then
            echo "ERROR: Potential secrets found in:"
            echo "$hits"
            exit 1
          fi
          echo "No hardcoded secrets found"

      - name: Check for private keys
        run: |
          hits=$(grep -r -l "BEGIN.*PRIVATE KEY" . --include="*.pem" --include="*.key" 2>/dev/null | grep -v "/.git/" | grep -v "/tests/" || true)
          if [ -n "$hits" ]; then
            echo "ERROR: Private key files found:"
            echo "$hits"
            exit 1
          fi
          echo "No private key files found"
